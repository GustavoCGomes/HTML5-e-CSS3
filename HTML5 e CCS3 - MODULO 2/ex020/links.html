<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Links</title>

  <style>

    /* SELETORES PERSONALIZADOS
      # = id
      . = class
      : = pseudo-class
      :: = pseudo-element
      > = children
    */

    body {
      font-family: Arial, Helvetica, sans-serif;
    }

    a {
      color: red;
      text-decoration: none;
      font-weight: bold;
    }

    a:visited {
      color: darkred;
    }

    a:hover {
      color: black;
      text-decoration: underline;
    }

    a:active {
      color: aqua;
    }

    a::after {
      content: ' 🔗';
      text-decoration: none;
      font-weight: normal;
      color: darkgrey;
    }

    .especial {
      background-color: rgb(236, 191, 191);
    }
  </style>
</head>
<body>
  <h1>Personalizando Links</h1>

  <ul>
    <li><a href="https://github.com/GustavoCGomes">Repositório GitHub</a></li>
    <li><a href="https://www.linkedin.com/in/gustavocgomes/">Linkedin</a></li>
    <li><a href="https://www.instagram.com/hogustavo/" class="especial">Instagram</a></li>
  </ul>
</body>
</html>

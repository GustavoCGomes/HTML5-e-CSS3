<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desafio 07</title>
  </head>
  <body>
    <h1>Imagens flexível</h1>

    <p>
      Vamos abrir esse site em vários dispositivos diferentes ou simplesmente
      aumente e diminuao tamanho do seu navegador.
    </p>

    <picture>
      <source
        media="(max-width: 750px)"
        srcset="Imagens/paisagem-p.png"
        type="image/png"
      />
      <source
        media="(max-width: 1000px)"
        srcset="Imagens/paisagem-m.png"
        type="image/png"
      />
      <img src="imagens/paisagem-g.png" alt="imagem flexivel" />
    </picture>
  </body>
</html>
